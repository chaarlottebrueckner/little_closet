name: little_closet
description: "A futuristic, y2k-girly wardrobe management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Image Handling
  image_picker: ^1.1.2
  image: ^4.1.7
  cached_network_image: ^3.3.1

  # HTTP for Gemini API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
